name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t permanent-enrichment:${{ github.sha }} .

      - name: Verify container starts and health check passes
        run: |
          docker run -d --name test-container -p 8501:8501 \
            -e APP_PASSWORD=test123 \
            permanent-enrichment:${{ github.sha }}
          sleep 15
          curl --fail http://localhost:8501/_stcore/health || exit 1
          docker stop test-container
